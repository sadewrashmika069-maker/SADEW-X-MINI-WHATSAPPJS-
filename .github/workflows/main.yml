name: Run WhatsApp Bot Test
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      run: npm install

    - name: Start Bot and Expose Port 8000
      run: |
        # බොට් එක Background එකේ රන් කරනවා
        node index.js &
        sleep 15
        
        # Pinggy හරහා Port 8000 එළියට දෙනවා (8080 නෙමෙයි)
        ssh -p 443 -R0:localhost:8000 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io
