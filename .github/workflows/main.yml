name: Run WhatsApp Bot Test
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install Dependencies
      run: npm install

    - name: Start Bot and Expose Port 8000
      run: |
        # 1. Pinggy එක Background එකේ රන් කරලා පෝට් එක එළියට දෙමු (අගට & දාලා තියෙන්නේ ඒකයි)
        ssh -p 443 -R0:localhost:8000 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io &
        
        # 2. තත්පර 5ක් Pinggy එක කනෙක්ට් වෙනකන් ඉමු
        sleep 15
        
        # 3. බොට් එක Foreground (කෙලින්ම) රන් කරනවා!
        node index.js
        
        # Pinggy හරහා Port 8000 එළියට දෙනවා (8080 නෙමෙයි)
        ssh -p 443 -R0:localhost:8000 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io
